name: Bug Report
description: Report a bug or unexpected behavior in one of our projects
title: "[Bug] <short description>"
labels: ["bug"]
body:
  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project is this bug related to?
      options:
        - Meow Focus
        - Other / General
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — app crashes or data loss
        - High — major feature broken
        - Medium — feature partially broken
        - Low — minor visual or cosmetic issue
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to consistently reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: If applicable, add screenshots or a recording to help explain the problem.

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15, Windows 11, iOS 18

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (console errors, network logs, etc.)
