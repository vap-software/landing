name: Feature Request
description: Suggest a new feature or improvement for one of our projects
title: "[Feature] <short description>"
labels: ["enhancement"]
body:
  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project should this feature be added to?
      options:
        - Meow Focus
        - Other / General
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Feature
        - Improvement to existing feature
        - Performance
        - Accessibility
        - UI / Design
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration you have?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples here.
